name: CI

on:
  push:
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov httpx[http2]

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type check)
        run: mypy . --show-error-codes

      - name: Pytest with coverage
        run: pytest -q --cov=. --cov-report=term-missing --cov-report=xml

      - name: Build Docker image
        run: docker build -t fitness-bot .

      - name: Verify .dockerignore (ensure .env not in image)
        run: |
          docker run --rm fitness-bot sh -c 'test -f /.env && exit 1 || exit 0'

